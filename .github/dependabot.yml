version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: America/Chicago
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /app
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: America/Chicago
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm

  - package-ecosystem: docker
    directory: /app
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: America/Chicago
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker

  - package-ecosystem: terraform
    directory: /aws
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: America/Chicago
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - terraform
