global:
  resolve_timeout: 5m

route:
  receiver: triage
  group_by:
    - alertname
    - service
    - severity
  group_wait: 15s
  group_interval: 2m
  repeat_interval: 1h
  routes:
    - receiver: primary-oncall
      matchers:
        - severity="critical"
    - receiver: secondary-oncall
      matchers:
        - severity="warning"

receivers:
  - name: triage
    webhook_configs:
      - url: http://host.docker.internal:5001/triage
        send_resolved: true

  - name: primary-oncall
    webhook_configs:
      - url: http://host.docker.internal:5001/primary
        send_resolved: true

  - name: secondary-oncall
    webhook_configs:
      - url: http://host.docker.internal:5001/secondary
        send_resolved: true
